name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: "Deploy infrastructure"
        type: boolean
        default: false
      deploy_backend:
        description: "Deploy backend"
        type: boolean
        default: false
      deploy_torrent_scraper:
        description: "Deploy torrent-scraper"
        type: boolean
        default: false
      deploy_filter_generator:
        description: "Deploy filter-generator"
        type: boolean
        default: false
      deploy_frontend:
        description: "Deploy frontend"
        type: boolean
        default: false
      deploy_cognito_trigger:
        description: "Deploy cognito trigger"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      torrent_scraper: ${{ steps.filter.outputs.torrent_scraper }}
      filter_generator: ${{ steps.filter.outputs.filter_generator }}
      filter_engine: ${{ steps.filter.outputs.filter_engine }}
      cognito_trigger: ${{ steps.filter.outputs.cognito_trigger }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            torrent_scraper:
              - 'lambdas/torrent-scraper/**'
            filter_generator:
              - 'lambdas/filter-generator/**'
            filter_engine:
              - 'packages/filter-engine/**'
            cognito_trigger:
              - 'lambdas/cognito-trigger/**'
            infra:
              - 'infrastructure/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build --workspace=packages/filter-engine
      - run: npm test --workspace=backend

  infra:
    needs: [changes, test]
    if: needs.changes.outputs.infra == 'true' || inputs.deploy_infra == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
        working-directory: infrastructure
      - run: terraform apply -auto-approve
        working-directory: infrastructure

  backend:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.filter_engine == 'true' || inputs.deploy_backend == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        run: |
          npm ci --legacy-peer-deps
          npm run build --workspace=packages/filter-engine
          npm run build --workspace=backend
      - name: Package
        run: |
          mkdir -p lambda-pkg/dist
          cp -r backend/dist/* lambda-pkg/dist/
          cp backend/package.json package-lock.json lambda-pkg/
          # Remove filter-engine from package.json (it's a local file: dep, we copy it manually)
          node -e "const p=require('./lambda-pkg/package.json'); delete p.dependencies['filter-engine']; require('fs').writeFileSync('./lambda-pkg/package.json', JSON.stringify(p,null,2))"
          cd lambda-pkg && npm ci --omit=dev --legacy-peer-deps --ignore-scripts
          # Copy filter-engine into node_modules after npm ci
          mkdir -p node_modules/filter-engine
          cp -r ../packages/filter-engine/dist/* node_modules/filter-engine/
          cp ../packages/filter-engine/package.json node_modules/filter-engine/
          zip -rq ../backend.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-backend \
            --zip-file fileb://backend.zip

  torrent-scraper:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.torrent_scraper == 'true' || inputs.deploy_torrent_scraper == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lambdas/torrent-scraper/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        working-directory: lambdas/torrent-scraper
        run: |
          npm ci
          npm run build
      - name: Package
        run: |
          mkdir -p torrent-scraper-pkg/dist
          cp -r lambdas/torrent-scraper/dist/* torrent-scraper-pkg/dist/
          cp lambdas/torrent-scraper/package.json lambdas/torrent-scraper/package-lock.json torrent-scraper-pkg/
          cd torrent-scraper-pkg && npm ci --omit=dev
          zip -rq ../torrent-scraper.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-torrent-scraper \
            --zip-file fileb://torrent-scraper.zip

  filter-generator:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.filter_generator == 'true' || needs.changes.outputs.filter_engine == 'true' || inputs.deploy_filter_generator == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lambdas/filter-generator/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build filter-engine
        working-directory: packages/filter-engine
        run: |
          npm install
          npm run build
      - name: Build
        working-directory: lambdas/filter-generator
        run: |
          npm ci
          npm run build
      - name: Package
        run: |
          mkdir -p filter-generator-pkg/dist
          cp -r lambdas/filter-generator/dist/* filter-generator-pkg/dist/
          cp lambdas/filter-generator/package.json lambdas/filter-generator/package-lock.json filter-generator-pkg/
          # Remove filter-engine from package.json (local file: dep, copied manually)
          node -e "const p=require('./filter-generator-pkg/package.json'); delete p.dependencies['filter-engine']; require('fs').writeFileSync('./filter-generator-pkg/package.json', JSON.stringify(p,null,2))"
          cd filter-generator-pkg && npm ci --omit=dev --ignore-scripts
          # Copy filter-engine into node_modules after npm ci
          mkdir -p node_modules/filter-engine
          cp -r ../packages/filter-engine/dist/* node_modules/filter-engine/
          cp ../packages/filter-engine/package.json node_modules/filter-engine/
          zip -rq ../filter-generator.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-filter-generator \
            --zip-file fileb://filter-generator.zip

  cognito-trigger:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.cognito_trigger == 'true' || inputs.deploy_cognito_trigger == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lambdas/cognito-trigger/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        working-directory: lambdas/cognito-trigger
        run: |
          npm ci
          npm run build
      - name: Package
        run: |
          mkdir -p trigger-pkg/dist
          cp -r lambdas/cognito-trigger/dist/* trigger-pkg/dist/
          cp lambdas/cognito-trigger/package.json lambdas/cognito-trigger/package-lock.json trigger-pkg/
          cd trigger-pkg && npm ci --omit=dev
          zip -rq ../cognito-trigger.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-cognito-trigger \
            --zip-file fileb://cognito-trigger.zip

  frontend:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.frontend == 'true' || inputs.deploy_frontend == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: |
          npm ci --legacy-peer-deps
          npm run build --workspace=frontend
      - name: Deploy
        run: |
          aws s3 sync frontend/dist/ s3://filterbrr-frontend --delete
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?contains(@, 'filterbrr.com')]].Id" \
            --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
