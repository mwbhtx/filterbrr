name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: "Deploy infrastructure"
        type: boolean
        default: false
      deploy_backend:
        description: "Deploy backend"
        type: boolean
        default: false
      deploy_scraper:
        description: "Deploy scraper"
        type: boolean
        default: false
      deploy_analyzer:
        description: "Deploy analyzer"
        type: boolean
        default: false
      deploy_frontend:
        description: "Deploy frontend"
        type: boolean
        default: false
      deploy_cognito_trigger:
        description: "Deploy cognito trigger"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      scraper: ${{ steps.filter.outputs.scraper }}
      analyzer: ${{ steps.filter.outputs.analyzer }}
      cognito_trigger: ${{ steps.filter.outputs.cognito_trigger }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            scraper:
              - 'lambdas/scraper/**'
            analyzer:
              - 'lambdas/analyzer/**'
            cognito_trigger:
              - 'lambdas/cognito-trigger/**'
            infra:
              - 'infrastructure/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test --workspace=backend

  infra:
    needs: [changes, test]
    if: needs.changes.outputs.infra == 'true' || inputs.deploy_infra == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
        working-directory: infrastructure
      - run: terraform apply -auto-approve
        working-directory: infrastructure

  backend:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.backend == 'true' || inputs.deploy_backend == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        run: |
          npm ci --legacy-peer-deps
          npm run build --workspace=backend
      - name: Package
        run: |
          mkdir -p lambda-pkg/dist
          cp -r backend/dist/* lambda-pkg/dist/
          cp backend/package.json package-lock.json lambda-pkg/
          cd lambda-pkg && npm ci --omit=dev --legacy-peer-deps
          zip -rq ../backend.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-backend \
            --zip-file fileb://backend.zip

  scraper:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.scraper == 'true' || inputs.deploy_scraper == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lambdas/scraper/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        working-directory: lambdas/scraper
        run: |
          npm ci
          npm run build
      - name: Package
        run: |
          mkdir -p scraper-pkg/dist
          cp -r lambdas/scraper/dist/* scraper-pkg/dist/
          cp lambdas/scraper/package.json lambdas/scraper/package-lock.json scraper-pkg/
          cd scraper-pkg && npm ci --omit=dev
          zip -rq ../scraper.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-scraper \
            --zip-file fileb://scraper.zip

  analyzer:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.analyzer == 'true' || inputs.deploy_analyzer == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lambdas/analyzer/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        working-directory: lambdas/analyzer
        run: |
          npm ci
          npm run build
      - name: Package
        run: |
          mkdir -p analyzer-pkg/dist
          cp -r lambdas/analyzer/dist/* analyzer-pkg/dist/
          cp lambdas/analyzer/package.json lambdas/analyzer/package-lock.json analyzer-pkg/
          cd analyzer-pkg && npm ci --omit=dev
          zip -rq ../analyzer.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-analyzer \
            --zip-file fileb://analyzer.zip

  cognito-trigger:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.cognito_trigger == 'true' || inputs.deploy_cognito_trigger == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lambdas/cognito-trigger/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        working-directory: lambdas/cognito-trigger
        run: |
          npm ci
          npm run build
      - name: Package
        run: |
          mkdir -p trigger-pkg/dist
          cp -r lambdas/cognito-trigger/dist/* trigger-pkg/dist/
          cp lambdas/cognito-trigger/package.json lambdas/cognito-trigger/package-lock.json trigger-pkg/
          cd trigger-pkg && npm ci --omit=dev
          zip -rq ../cognito-trigger.zip dist/ node_modules/ -x "dist/*.map"
      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name filterbrr-cognito-trigger \
            --zip-file fileb://cognito-trigger.zip

  frontend:
    needs: [changes, test, infra]
    if: "!failure() && !cancelled() && (needs.changes.outputs.frontend == 'true' || inputs.deploy_frontend == true)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          VITE_DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          VITE_DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: |
          npm ci --legacy-peer-deps
          npm run build --workspace=frontend
      - name: Deploy
        run: |
          aws s3 sync frontend/dist/ s3://filterbrr-frontend --delete
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?contains(@, 'filterbrr.com')]].Id" \
            --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
